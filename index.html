<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Музыка</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ===== ГЛАВНАЯ ===== -->
  <div class="main-page" id="mainPage">

    <header class="top-bar">
      <div class="logo">Яндекс ✦ Музыка</div>
    </header>

    <section class="hero" onclick="openPlayer()">
      <div class="wave-blob"></div>
      <h1 class="hero-title">
        <span class="hero-icon" id="heroIcon">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        </span>
        Моя волна
      </h1>
    </section>

    <div class="scroll-area">

      <div class="cards-scroll">
        <div class="big-card" onclick="openPlayer()">
          <div class="big-card-img">
            <img src="img/cupsize_pink.jpg" alt="CUPSIZE">
          </div>
          <div class="big-card-label">
            <div class="big-card-title">Для вас</div>
            <div class="big-card-sub">CUPSIZE</div>
          </div>
        </div>
        <div class="big-card" onclick="openPlayer()">
          <div class="big-card-img gradient-2"></div>
          <div class="big-card-label">
            <div class="big-card-title">Тренды</div>
            <div class="big-card-sub">Лучшее сейчас</div>
          </div>
        </div>
        <div class="big-card" onclick="openPlayer()">
          <div class="big-card-img gradient-3"></div>
          <div class="big-card-label">
            <div class="big-card-title">Новинки</div>
            <div class="big-card-sub">Свежая музыка</div>
          </div>
        </div>
      </div>

      <!-- только Мне нравится, без Коллекции -->
      <div class="small-cards-grid single">
        <div class="small-card" onclick="openPlayer()">
          <div class="small-card-img heart-bg">
            <svg viewBox="0 0 24 24" fill="#ff4060" width="22" height="22">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
            </svg>
          </div>
          <div class="small-card-title">Мне нравится</div>
        </div>
      </div>

      <div class="section-row">
        <div class="section-title">Недавно слушали</div>
        <div class="recent-list">
          <div class="recent-item" onclick="openPlayer()">
            <img class="recent-img" src="img/cupsize_pink.jpg" alt="CUPSIZE">
            <div class="recent-info">
              <div class="recent-title">Привет, если ты мне не ответишь</div>
              <div class="recent-artist">CUPSIZE</div>
            </div>
            <button class="recent-play" onclick="event.stopPropagation(); openPlayer()">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            </button>
          </div>
        </div>
      </div>

    </div>

    <div class="bottom-nav">
      <div class="mini-player" id="miniPlayer" onclick="openPlayer()">
        <img class="mini-thumb" src="img/cupsize_pink.jpg" alt="cover">
        <div class="mini-info">
          <div class="mini-title">Привет, если ты мне не ответишь</div>
          <div class="mini-artist">CUPSIZE</div>
        </div>
        <div class="mini-actions">
          <button class="mini-like" id="miniLikeBtn" onclick="event.stopPropagation(); toggleLike()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
            </svg>
          </button>
          <button class="mini-play" id="miniPlayBtn" onclick="event.stopPropagation(); togglePlay()">
            <svg id="miniPlayIcon" viewBox="0 0 24 24" fill="currentColor">
              <path d="M8 5v14l11-7z"/>
            </svg>
          </button>
        </div>
      </div>

      <nav class="nav-tabs">
        <div class="nav-tab active">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3z"/></svg>
          <span>Музыка</span>
        </div>
      </nav>
    </div>
  </div>

  <!-- ===== ПЛЕЕР ===== -->
  <div class="player-page" id="playerPage">

    <header class="player-header">
      <button class="ph-btn" onclick="closePlayer()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>
      <div class="player-header-center">
        <span class="player-header-label">Моя волна по треку</span>
        <div class="player-header-title">CUPSIZE</div>
      </div>
      <div style="width:36px"></div>
    </header>

    <div class="cover-lyrics-wrap" id="coverWrap">
      <img src="img/cupsize_pink.jpg" alt="CUPSIZE" id="coverImg" class="cover-img">
      <div class="subtitle-view" id="subtitleView">
        <div class="subtitle-line" id="subtitleLine"></div>
      </div>
    </div>

    <div class="player-track-info">
      <div class="player-track-meta">
        <div class="player-track-title">Привет, если ты мне не ответишь</div>
        <div class="player-track-artist">CUPSIZE</div>
      </div>
    </div>

    <div class="player-progress">
      <div class="prog-bar" id="progBar">
        <div class="prog-fill" id="progFill">
          <div class="prog-thumb"></div>
        </div>
      </div>
      <div class="prog-times">
        <span id="progTime">0:00</span>
        <span id="progDuration">0:00</span>
      </div>
    </div>

    <div class="player-controls">
      <button class="ctrl" id="volBtn" onclick="toggleMute()">
        <svg id="volIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
        </svg>
      </button>
      <button class="ctrl" onclick="prevTrack()">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
      </button>
      <button class="big-play" id="bigPlayBtn" onclick="togglePlay()">
        <svg id="bigPlayIcon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M8 5v14l11-7z"/>
        </svg>
      </button>
      <button class="ctrl" onclick="nextTrack()">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M6 18l8.5-6L6 6v12zm2-8.14 5.35 3.64-5.35 3.6V9.86zM16 6h2v12h-2z"/>
        </svg>
      </button>
      <button class="ctrl" id="heartBtn" onclick="toggleLike()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
      </button>
    </div>

    <div class="player-bottom-row">
      <button class="pb-btn" id="repeatBtn" onclick="toggleRepeat()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="17 1 21 5 17 9"/>
          <path d="M3 11V9a4 4 0 0 1 4-4h14"/>
          <polyline points="7 23 3 19 7 15"/>
          <path d="M21 13v2a4 4 0 0 1-4 4H3"/>
        </svg>
      </button>
      <button class="pb-btn" id="lyricsBtn" onclick="toggleLyrics()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="10" x2="14" y2="10"/>
          <line x1="4" y1="14" x2="18" y2="14"/><line x1="4" y1="18" x2="12" y2="18"/>
        </svg>
      </button>
      <button class="pb-btn" onclick="closePlayer()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </button>
    </div>

    <audio id="audioPlayer" src="music/2_5393295419767805844.flac" preload="metadata"></audio>
  </div>

  <script src="script.js"></script>
</body>
</html>
